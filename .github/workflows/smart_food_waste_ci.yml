name: Smart Food Waste Management CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  flutter-validation:
    name: Flutter Code Quality & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java (needed for Android builds if needed)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Analyze Flutter Code
        run: flutter analyze

      - name: Run Flutter Unit Tests
        run: flutter test

  node-appium-validation:
    name: NodeJS Appium Test Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup NodeJS
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: appium_testing/package-lock.json

      - name: Install Dependencies
        run: |
          cd appium_testing
          npm ci

      - name: Run Appium Tests (Simulated Mode)
        run: |
          cd appium_testing
          node e2e_test.js

      - name: Upload Node Appium Reports
        uses: actions/upload-artifact@v3
        with:
          name: node-appium-excel-reports
          path: appium_testing/reports/

  node-selenium-validation:
    name: NodeJS Selenium Test Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup NodeJS
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: selenium_testing/package-lock.json

      - name: Install Dependencies
        run: |
          cd selenium_testing
          npm ci

      - name: Run Selenium Tests (Simulated Mode)
        run: |
          cd selenium_testing
          node e2e_selenium_test.js

      - name: Upload Node Selenium Reports
        uses: actions/upload-artifact@v3
        with:
          name: node-selenium-excel-reports
          path: selenium_testing/reports/

  python-appium-validation:
    name: Python Appium Test Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: appium_testing_python/requirements.txt

      - name: Install Dependencies
        run: |
          cd appium_testing_python
          pip install -r requirements.txt

      - name: Run Python Appium Tests (Simulated Mode)
        run: |
          cd appium_testing_python
          python e2e_test.py

      - name: Upload Python Appium Reports
        uses: actions/upload-artifact@v3
        with:
          name: python-appium-excel-reports
          path: appium_testing_python/reports/
